\*****************************************************************************
\* TLC configuration for SCKA.tla  (run: see claude-proofs/scripts/run_tla.sh)
\*   java -cp tla2tools.jar tlc2.TLC -config SCKA.cfg SCKA.tla
\*
\* MaxEpoch=3 exercises epoch 1 (Alice EK / Bob CT), epoch 2 (roles swapped),
\* epoch 3 (swapped back) -- enough to catch role-alternation, monotonicity,
\* and uniqueness bugs.  MaxCopies=2 exercises duplication + reorder.
\*****************************************************************************

SPECIFICATION Spec

CONSTANTS
    MaxEpoch  = 3
    MaxCopies = 2

\* Safety invariants (checked at every reachable state).
INVARIANT TypeOK
INVARIANT Agreement
INVARIANT Uniqueness
INVARIANT MonotoneGapless
INVARIANT NoKeyAhead

\* Liveness (needs the Fairness conjunct inside Spec).
PROPERTY Progress
PROPERTY NoDeadlock

\* No CONSTRAINT needed: the CanPut guard (net[m] < MaxCopies) already bounds the
\* in-flight bag, so the state space is finite without a state constraint -- and
\* state constraints interfere with TLC liveness checking (Specifying Systems
\* 14.3.5), so we deliberately omit one here.
