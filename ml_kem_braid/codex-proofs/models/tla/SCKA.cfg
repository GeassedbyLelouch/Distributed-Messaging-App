\*****************************************************************************
\* TLC / Apalache model-check configuration for SCKA.tla
\*
\* This bounds the (otherwise infinite) model so that TLC can explore it
\* exhaustively and Apalache can do bounded symbolic checking.
\*
\* HOW TO RUN (see the header of SCKA.tla for full install notes):
\*   TLC:       tlc -config SCKA.cfg SCKA.tla
\*   Apalache:  apalache-mc check --config=SCKA.cfg --inv=Inv SCKA.tla
\*
\* EXPECTED (if the model + properties are correct):
\*   - All INVARIANTS pass: "No error has been found."
\*   - PROPERTIES (Progress, NoDeadlock) require the Fairness in Spec; TLC
\*     should report them satisfied. Apalache does NOT check temporal props.
\*
\* NOTE: this scaffold has NOT been executed; treat the expected results as
\* the GOAL, not a confirmed outcome. See the TODO list at the end of SCKA.tla.
\*****************************************************************************

SPECIFICATION Spec

CONSTANTS
    \* Small bound keeps the state space tractable. MaxEpoch=3 exercises:
    \*   epoch 1 (Alice EK-side / Bob CT-side),
    \*   epoch 2 (roles swapped),
    \*   epoch 3 (roles swapped back) -- enough to catch role-alternation and
    \* monotonicity bugs. Bump to 4-5 for more confidence (state space grows).
    MaxEpoch = 3

\* ---------------------------------------------------------------------------
\* SAFETY INVARIANTS (checked at every reachable state).
\* ---------------------------------------------------------------------------
INVARIANT TypeOK
INVARIANT Agreement
INVARIANT Uniqueness
INVARIANT MonotoneGapless

\* ---------------------------------------------------------------------------
\* LIVENESS / TEMPORAL PROPERTIES (TLC only; Apalache ignores PROPERTY).
\* These rely on the Fairness conjunct inside Spec.
\* ---------------------------------------------------------------------------
PROPERTY Progress
PROPERTY NoDeadlock

\* ---------------------------------------------------------------------------
\* STATE CONSTRAINT to keep the in-flight message bag finite.
\*
\* `net \in [Msg -> Nat]` allows unbounded duplication, which would make TLC's
\* state space infinite. We cap the number of copies of any single message at 2
\* (enough to exercise duplication + reorder without blowing up). The DupMsg
\* action can still fire up to this cap.
\*
\* TODO(human): if TLC reports the constraint is too tight (e.g. Progress fails
\* only because re-sends are capped), raise the bound. If the state space is too
\* large, lower MaxEpoch first.
\* ---------------------------------------------------------------------------
CONSTRAINT BoundedNet

\* BoundedNet is defined in SCKA.tla (TLC requires CONSTRAINT operators to live
\* in the module). It caps net[m] <= 2. Raise the cap there if Progress fails
\* only due to capped re-sends; lower MaxEpoch first if the state space is too
\* large. This is one of the documented TODOs in SCKA.tla.
